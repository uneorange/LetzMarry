<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Einladung</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }
    .toolbar {
      padding: 10px;
      background: #f0f0f0;
      text-align: center;
    }
    button {
      margin: 5px;
      padding: 8px 16px;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button onclick="openPDF('Einladung.pdf')">Deutsch</button>
    <button onclick="openPDF('Einladung_Lux.pdf')">Lëtzebuergesch</button>
    <button onclick="openPDF('Einladung_Fra.pdf')">Français</button>
  </div>

  <iframe id="viewer" src="Einladung.pdf"></iframe>

  <script>
    function openPDF(file) {
      document.getElementById('viewer').src = file;
    }
  </script>

</body>
</html>
