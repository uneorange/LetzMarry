<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Select Language</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
    }

    /* Centered language selector */
    .language-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 24px;
    }

    .language-screen h1 {
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: 600;
      color: #111827;
    }

    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pdf-btn {
      font-size: 20px;
      font-weight: 600;
      padding: 18px 36px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .pdf-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    /* Country colors */
    .germany {
      background: linear-gradient(135deg, #a3b18a, #8f9f79);
    }

    .luxembourg {
      background: linear-gradient(135deg, #a3b18a, #8f9f79);
    }

    .france {
      background: linear-gradient(135deg, #a3b18a, #8f9f79);
    }

    /* PDF viewer (hidden initially) */
    .viewer-container {
      display: none;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #e5e7eb;
    }
  </style>
</head>

<body>


  <!-- Language selection screen -->
  <div id="languageScreen" class="language-screen">
    <h1>Select language</h1>

    <div class="buttons">
      <button class="pdf-btn germany"
              onclick="openPDF('Einladung.pdf')">
        🇩🇪 Deutsch
      </button>

      <button class="pdf-btn luxembourg"
              onclick="openPDF('Einladung_Lux.pdf')">
        🇱🇺 Lëtzebuergesch
      </button>

      <button class="pdf-btn france"
              onclick="openPDF('Einladung_Fra.pdf')">
        🇫🇷 Français
      </button>
    </div>
  </div>

  <!-- PDF viewer -->
  <div id="viewerContainer" class="viewer-container">
    <iframe id="viewer"></iframe>
  </div>

  <!-- ✅ JavaScript at the end -->
  <script>
    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }
  
    function openPDF(file) {
      if (isIOS()) {
        // iOS Safari cannot embed PDFs reliably
        window.location.href = file;
        return;
      }
  
      // Android + Desktop → embed directly
      document.getElementById("languageScreen").style.display = "none";
      document.getElementById("viewerContainer").style.display = "block";
      document.getElementById("viewer").src = file;
    }
  </script>

</body>
</html>
